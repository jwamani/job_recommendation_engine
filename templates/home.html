{% extends "base.html" %}
{% block title %}Home — JobMatch{% endblock %}
{% block content %}
<div class="text-center py-5">
  <h1>Find the job that matches you</h1>
  <p class="lead">
    Personalized recommendations based on your profile and activity.
  </p>
  {% url 'jobs:job_list' as jobs_url %}
  {% if jobs_url %}
  <a href="{{ jobs_url }}" class="btn btn-primary btn-lg">Browse Jobs</a>
  {% endif %}
</div>
{% endblock %}
